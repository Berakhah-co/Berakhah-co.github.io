<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- Metadatos SEO -->
    <title>Berakhah — Maison de Joaillerie</title>
    <meta
      name="description"
      content="Descubre la colección Berakhah de joyería refinada y accesorios con propósito. Piezas únicas que cuentan tu historia. Joyería exclusiva en Medellín."
    />
    <meta
      name="keywords"
      content="Berakhah, Maison de Joaillerie, joyería Medellín, accesorios con propósito, anillos, collares, pulseras, zarcillos, moda Medellín"
    />
    <meta name="author" content="Berakhah Medellín" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://berakhahmedellin.pythonanywhere.com/"
    />
    <meta property="og:title" content="Berakhah — Maison de Joaillerie" />
    <meta
      property="og:description"
      content="Joyas con significado y diseño exclusivo. Explora nuestra colección completa."
    />
    <meta property="og:image" content="static/Logo.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://berakhahmedellin.pythonanywhere.com/"
    />
    <meta property="twitter:title" content="Berakhah — Maison de Joaillerie" />
    <meta
      property="twitter:description"
      content="Joyas con significado y diseño exclusivo. Explora nuestra colección completa."
    />

    <!-- Icono -->
    <link rel="icon" href="static/iconos/Logo.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" href="static/Logo.jpg" />

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        /* Forzamos 100% para evitar que el viewport de iOS nos juegue bromas */
        height: 100%;
        width: 100%;
        overflow: hidden;
        background-color: #000;
      }
      /* El contenedor que manejará el scroll si el iframe crece en iOS */
      .iframe-container {
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        overflow: hidden;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="iframe-container">
      <iframe
        id="berakhah-iframe"
        src="https://berakhahmedellin.pythonanywhere.com/"
        title="Berakhah Medellín Store"
        allow="fullscreen; geolocation; microphone; camera; midi; encrypted-media"
        loading="eager"
      >
      </iframe>
    </div>

    <script>
      const BACKEND_URL = 'https://berakhahmedellin.pythonanywhere.com';
      const iframe = document.getElementById('berakhah-iframe');

      // 1. Initial Load: Check for 'p' param to load a deep link
      const params = new URLSearchParams(window.location.search);
      const initialPath = params.get('p') || window.location.hash.replace('#', '');
      
      if (initialPath && initialPath.startsWith('/')) {
        iframe.src = BACKEND_URL + initialPath;
        // Limpiamos la URL visible para que no se vea el ?p=
        window.history.replaceState(null, '', initialPath);
      }

      // 2. Escuchar cambios de navegación desde el iframe
      window.addEventListener('message', (event) => {
        if (event.origin !== BACKEND_URL) return;
        
        if (event.data && event.data.type === 'NAV') {
          const newPath = event.data.path;
          
          // Si la ruta cambió y no somos la misma página
          if (window.location.pathname !== newPath) {
            // Actualizamos la URL a la versión "limpia" (ej: /producto/anillo)
            window.history.replaceState({ path: newPath }, '', newPath);
          }
        }
      });
    </script>
  </body>
</html>
